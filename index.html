<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pinak 3.0</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
* {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg: #F5F4F0;
  --surface: #FFFFFF;
  --surface2: #EFEDE8;
  --text-primary: #1A1A1A;
  --text-secondary: #7A7570;
  --text-muted: #B5B0AA;
  --accent: #2C5F2E;
  --accent-light: #E8F0E8;
  --border: #E2DED8;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.06);
  --radius: 16px;
  --radius-sm: 10px;
}

html, body {
  height: 100%;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text-primary);
  overflow-x: hidden;
}

/* Subtle noise texture overlay */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 390px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 0 20px 48px;
}

/* ── HEADER ── */
.header {
  padding: 52px 0 32px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.header-eyebrow {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 2px;
}

.header-title {
  font-family: 'DM Serif Display', serif;
  font-size: 36px;
  font-weight: 400;
  color: var(--text-primary);
  letter-spacing: -0.5px;
  line-height: 1;
}

.header-title em {
  font-style: italic;
  color: var(--text-secondary);
}

.header-line {
  width: 100%;
  height: 1px;
  background: var(--border);
  margin-top: 24px;
  position: relative;
}

.header-line::before {
  content: '';
  position: absolute;
  left: 0; top: 0;
  height: 1px;
  width: 48px;
  background: var(--accent);
}

/* ── GRID ── */
.grid-section {
  margin-top: 8px;
}

.section-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 14px;
  padding-left: 2px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 10px;
}

/* ── BUTTON CARD ── */
.btn-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  overflow: hidden;
  position: relative;
  transition:
    transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1),
    box-shadow 0.2s ease,
    border-color 0.2s ease;
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 8px;

  /* entrance */
  opacity: 0;
  transform: translateY(12px) scale(0.97);
}

.btn-card.visible {
  animation: cardIn 0.4s cubic-bezier(0.34,1.2,0.64,1) forwards;
}

@keyframes cardIn {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.btn-card:hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow: var(--shadow-md);
  border-color: var(--accent);
}

.btn-card:active {
  transform: scale(0.95);
  box-shadow: var(--shadow-sm);
}

/* top accent strip */
.btn-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), transparent);
  opacity: 0;
  transition: opacity 0.2s ease;
}

.btn-card:hover::before {
  opacity: 1;
}

/* ── ICON ── */
.icon-wrap {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  overflow: hidden;
  flex-shrink: 0;
  transition: background 0.2s ease;
}

.btn-card:hover .icon-wrap {
  background: var(--accent-light);
  border-color: rgba(44,95,46,0.2);
}

.icon-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 11px;
}

/* ── LABEL ── */
.btn-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.3px;
  color: var(--text-secondary);
  text-align: center;
  line-height: 1.3;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding: 0 4px;
  transition: color 0.2s ease;
}

.btn-card:hover .btn-label {
  color: var(--text-primary);
}

/* ── LOADING SCREEN ── */
.loader {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

.loader.show {
  opacity: 1;
  pointer-events: all;
}

.loader-icon {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  animation: loaderBounce 0.8s ease-in-out infinite alternate;
}

@keyframes loaderBounce {
  from { transform: translateY(0); }
  to { transform: translateY(-6px); }
}

.loader-track {
  width: 120px;
  height: 2px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.loader-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0;
  animation: fillBar 1.1s cubic-bezier(0.4,0,0.2,1) forwards;
}

@keyframes fillBar {
  0% { width: 0; }
  60% { width: 75%; }
  100% { width: 100%; }
}

.loader-text {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: -12px;
}

/* ── FOOTER ── */
.footer {
  margin-top: auto;
  padding-top: 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.footer-name {
  font-family: 'DM Serif Display', serif;
  font-size: 13px;
  color: var(--text-muted);
}

.footer-version {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  background: var(--surface2);
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
}
</style>
</head>
<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-icon" id="loaderIcon">🔗</div>
  <div class="loader-track">
    <div class="loader-fill" id="loaderFill"></div>
  </div>
  <div class="loader-text">Opening...</div>
</div>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-eyebrow">App Launcher</div>
    <div class="header-title">Pinak <em>3.0</em></div>
    <div class="header-line"></div>
  </header>

  <!-- GRID ROWS -->
  <div class="grid-section">
    <div class="section-label">Quick Access</div>

    <!-- Row 1 -->
    <div class="grid" id="row1"></div>
    <!-- Row 2 -->
    <div class="grid" id="row2"></div>
    <!-- Row 3 -->
    <div class="grid" id="row3"></div>
    <!-- Row 4 -->
    <div class="grid" id="row4"></div>
    <!-- Row 5 -->
    <div class="grid" id="row5"></div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <span class="footer-name">Pinak</span>
    <span class="footer-version">v 3.0</span>
  </footer>

</div>

<script>
// ============================================
// ✏️ এখানে আপনার বাটন কাস্টমাইজ করুন
// ============================================
const buttons = [
  { label: "Life Tracker",  url: "https://pinakchakraborty626.github.io/Life-tracker/",    icon: "", emoji: "🩻" },
  { label: "birthday calendar",  url: "https://pinakchakraborty626.github.io/birthday-calendar-/",   icon: "", emoji: "🎂" },
  { label: "price calculator",  url: "https://pinakchakraborty626.github.io/price-calendar-/",  icon: "", emoji: "💻" },
  { label: "Salary Tracker Pro ",  url: "https://pinakchakraborty626.github.io/Salary-Tracker-Pro-/",   icon: "", emoji: "📊" },
  { label: "Note Pro",  url: "https://pinakchakraborty626.github.io/Note-Pro/", icon: "", emoji: "📝" },
  { label: "QR Code",  url: "https://pinakchakraborty626.github.io/Qr-Code-/",    icon: "", emoji: "🔎" },
  { label: "TikTok download ",  url: "https://ssstik.io/",    icon: "", emoji: "📥" },
  { label: "WhatsApp link",  url: "https://pinakchakraborty626.github.io/WhatsApp-Link/",   icon: "", emoji: "📎" },
  { label: "currency converter",  url: "https://pinakchakraborty626.github.io/currency-converter/",   icon: "", emoji: "💸" },
  { label: "Button 10", url: "https://wikipedia.org", icon: "", emoji: "📖" },
  { label: "Button 11", url: "https://reddit.com",    icon: "", emoji: "🔴" },
  { label: "Button 12", url: "https://linkedin.com",  icon: "", emoji: "💼" },
  { label: "Button 13", url: "https://tiktok.com",    icon: "", emoji: "🎭" },
  { label: "Button 14", url: "https://whatsapp.com",  icon: "", emoji: "💬" },
  { label: "Button 15", url: "https://telegram.org",  icon: "", emoji: "✈️" },
];
// ============================================

const rows = ['row1','row2','row3','row4','row5'];

buttons.forEach((btn, i) => {
  const rowEl = document.getElementById(rows[Math.floor(i / 3)]);

  const card = document.createElement('div');
  card.className = 'btn-card';

  const iconWrap = document.createElement('div');
  iconWrap.className = 'icon-wrap';

  if (btn.icon) {
    const img = document.createElement('img');
    img.src = btn.icon;
    img.alt = btn.label;
    img.onerror = () => { iconWrap.textContent = btn.emoji || '🔗'; };
    iconWrap.appendChild(img);
  } else {
    iconWrap.textContent = btn.emoji || '🔗';
  }

  const label = document.createElement('div');
  label.className = 'btn-label';
  label.textContent = btn.label;

  card.appendChild(iconWrap);
  card.appendChild(label);

  card.addEventListener('click', () => openLink(btn));
  rowEl.appendChild(card);

  // Staggered entrance
  setTimeout(() => card.classList.add('visible'), 80 + i * 45);
});

let loaderTimer = null;

function openLink(btn) {
  const loader = document.getElementById('loader');
  const loaderIcon = document.getElementById('loaderIcon');
  const fill = document.getElementById('loaderFill');

  // Set icon in loader
  loaderIcon.textContent = btn.icon ? '' : (btn.emoji || '🔗');
  if (btn.icon) {
    const img = document.createElement('img');
    img.src = btn.icon;
    img.style.cssText = 'width:32px;height:32px;border-radius:8px;object-fit:cover;';
    loaderIcon.innerHTML = '';
    loaderIcon.appendChild(img);
  }

  // Reset & show
  fill.style.animation = 'none';
  fill.offsetHeight;
  fill.style.animation = 'fillBar 1.1s cubic-bezier(0.4,0,0.2,1) forwards';

  loader.classList.add('show');

  clearTimeout(loaderTimer);
  loaderTimer = setTimeout(() => {
    loader.classList.remove('show');
    window.open(btn.url, '_blank');
  }, 1200);
}
</script>
</body>
</html>
